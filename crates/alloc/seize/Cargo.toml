[package]
edition = "2021"
rust-version = "1.72.0"
name = "seize"
version = "0.5.2"
authors = ["Ibraheem Ahmed <ibraheem@ibraheem.ca>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Fast, efficient, and predictable memory reclamation for concurrent data structures."
readme = "README.md"
keywords = [
    "lock-free",
    "rcu",
    "atomic",
    "garbage",
    "concurrency",
]
categories = [
    "concurrency",
    "memory-management",
]
license = "MIT"
repository = "https://github.com/ibraheemdev/seize"

[features]
default = ["fast-barrier"]
fast-barrier = [
    "windows-sys",
    "libc",
]

[lib]
name = "seize"
path = "src/lib.rs"

[[test]]
name = "lib"
path = "tests/lib.rs"

[[bench]]
name = "single_thread"
path = "benches/single_thread.rs"
harness = false

[[bench]]
name = "stack"
path = "benches/stack.rs"
harness = false

[dependencies.libc]
version = "0.2"
optional = true

[dev-dependencies.criterion]
version = "0.7.0"

[dev-dependencies.crossbeam-epoch]
version = "0.9.8"

[dev-dependencies.haphazard]
version = "0.1.8"

[target."cfg(windows)".dependencies.windows-sys]
version = ">=0.52, <=0.61"
features = ["Win32_System_Threading"]
optional = true

[lints.rust.unexpected_cfgs]
